name: Build litert_lm_main.exe

on:
  workflow_dispatch:          # trigger manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest   # ships with VS 2022 + MSVC — no local install needed
    timeout-minutes: 120

    steps:
      # ── Prerequisites ────────────────────────────────────────────────────────
      - name: Enable long paths
        shell: powershell
        run: |
          New-ItemProperty `
            -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name LongPathsEnabled -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-version: 1.x
          # Cache downloaded Bazel versions between runs
          bazelisk-cache: true
          # Cache build outputs — dramatically speeds up re-runs
          disk-cache: ${{ github.workflow }}

      # ── Source ───────────────────────────────────────────────────────────────
      - name: Clone LiteRT-LM
        run: git clone --depth=1 https://github.com/google-ai-edge/LiteRT-LM.git

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build litert_lm_main
        working-directory: LiteRT-LM
        shell: cmd
        run: |
          set ANDROID_HOME=
          set ANDROID_NDK_HOME=
          set ANDROID_NDK_ROOT=
          bazelisk --output_base=C:\_bazel build //runtime/engine:litert_lm_main --config=windows

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Collect binary + DLLs
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          # bazel-bin is a symlink into the output_base we set (C:\_bazel)
          $binDir = "LiteRT-LM\bazel-bin\runtime\engine"
          Copy-Item "$binDir\litert_lm_main.exe" dist\
          Get-ChildItem "$binDir\*.dll" -ErrorAction SilentlyContinue |
            Copy-Item -Destination dist\
          Write-Host "Contents of dist/:"
          Get-ChildItem dist\ | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert_lm_main-windows-x64
          path: dist\
          retention-days: 30
